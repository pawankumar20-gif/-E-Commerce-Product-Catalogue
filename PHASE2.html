<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCatalogue — Product Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --border: #e8e8e4;
      --border-hover: #c8c8c0;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b65;
      --text-muted: #a0a09a;
      --accent: #2563eb;
      --accent-light: #eff4ff;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --success-light: #f0fdf4;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAVBAR ─────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-logo {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .nav-logo span { color: var(--accent); }
    .nav-search {
      flex: 1;
      position: relative;
    }
    .nav-search input {
      width: 100%;
      padding: 8px 14px 8px 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .nav-search input:focus { border-color: var(--accent); background: var(--surface); }
    .nav-search input::placeholder { color: var(--text-muted); }
    .nav-search svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-cart {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cart:hover { background: var(--accent-hover); }
    .cart-count {
      background: #fff;
      color: var(--accent);
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* ── MAIN LAYOUT ─────────────────────────────────── */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ── SIDEBAR ─────────────────────────────────────── */
    .sidebar { position: sticky; top: 92px; }
    .sidebar-section { margin-bottom: 28px; }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 2px; }
    .filter-btn {
      padding: 7px 10px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13.5px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .filter-btn:hover { background: var(--border); color: var(--text-primary); }
    .filter-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .filter-count {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border-radius: 99px;
      padding: 1px 7px;
    }
    .filter-btn.active .filter-count { background: #dbeafe; color: var(--accent); }
    .price-range { padding: 4px 0; }
    .price-range input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .price-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .sort-select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ── MAIN CONTENT ─────────────────────────────────── */
    .main-content {}
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .results-count { font-size: 14px; color: var(--text-secondary); }
    .results-count strong { color: var(--text-primary); }

    /* ── PRODUCT GRID ─────────────────────────────────── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
      background: var(--bg);
    }
    .badge-new, .badge-sale {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
      letter-spacing: 0.04em;
    }
    .badge-new { background: #dcfce7; color: #15803d; }
    .badge-sale { background: #fee2e2; color: #b91c1c; }
    .product-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .product-cat {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .product-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .product-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .stars { color: #f59e0b; font-size: 13px; letter-spacing: 1px; }
    .product-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .price-block {}
    .price-current {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .price-original {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: line-through;
      margin-left: 5px;
    }
    .btn-add {
      padding: 7px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, transform 0.1s;
    }
    .btn-add:hover { background: var(--accent-hover); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add.added { background: var(--success); }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── CART PANEL ──────────────────────────────────── */
    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 380px;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 201;
      display: flex;
      flex-direction: column;
      transition: right 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-md);
    }
    .cart-panel.open { right: 0; }
    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cart-header h2 { font-size: 17px; font-weight: 600; }
    .btn-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: var(--radius-sm);
      line-height: 1;
    }
    .btn-close:hover { background: var(--bg); color: var(--text-primary); }
    .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 14px; }
    .cart-empty { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 14px; }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-md);
    }
    .cart-item-icon { font-size: 28px; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .cart-qty {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      line-height: 1;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-num { font-size: 13px; font-weight: 500; min-width: 20px; text-align: center; }
    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }
    .cart-summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13.5px;
      color: var(--text-secondary);
    }
    .summary-row.total {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .btn-checkout {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-checkout:hover { background: var(--accent-hover); }

    /* ── TOAST ───────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-size: 13.5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 300;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .cart-panel { width: 100%; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="#">Shop<span>Catalogue</span></a>
    <div class="nav-search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search products…" oninput="renderProducts()" />
    </div>
    <div class="nav-actions">
      <button class="btn-cart" onclick="toggleCart()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Cart <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- MAIN PAGE -->
<div class="page">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <p class="sidebar-label">Category</p>
      <div class="filter-group" id="category-filters"></div>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Max Price</p>
      <div class="price-range">
        <input type="range" id="price-range" min="0" max="500" value="500" step="10" oninput="updatePrice(this.value)" />
        <div class="price-labels">
          <span>₹0</span>
          <span id="price-label">₹500</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <p class="sidebar-label">Sort By</p>
      <select class="sort-select" id="sort-select" onchange="renderProducts()">
        <option value="default">Default</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="name">Name: A–Z</option>
      </select>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="results-header">
      <p class="results-count" id="results-count"></p>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </main>

</div>

<!-- CART PANEL -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="btn-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
    </div>
    <button class="btn-checkout" onclick="checkout()">Proceed to Checkout →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  /* ── DATA ─────────────────────────────────── */
  const products = [
    { id:1,  name:"Wireless Earbuds Pro",    cat:"Electronics",  price:129, original:179, rating:4.5, reviews:312, emoji:"🎧", badge:"sale" },
    { id:2,  name:"Slim Leather Wallet",     cat:"Accessories",  price:49,  original:null,rating:4.3, reviews:87,  emoji:"👜", badge:null  },
    { id:3,  name:"Running Shoes X1",        cat:"Footwear",     price:189, original:220, rating:4.7, reviews:543, emoji:"👟", badge:"sale" },
    { id:4,  name:"Ceramic Coffee Mug",      cat:"Kitchen",      price:24,  original:null,rating:4.1, reviews:65,  emoji:"☕", badge:"new"  },
    { id:5,  name:"Bluetooth Speaker Mini",  cat:"Electronics",  price:79,  original:null,rating:4.4, reviews:201, emoji:"🔊", badge:null  },
    { id:6,  name:"Yoga Mat Premium",        cat:"Sports",       price:59,  original:80,  rating:4.6, reviews:178, emoji:"🧘", badge:"sale" },
    { id:7,  name:"Mechanical Keyboard",     cat:"Electronics",  price:249, original:null,rating:4.8, reviews:432, emoji:"⌨️", badge:"new"  },
    { id:8,  name:"Stainless Water Bottle",  cat:"Kitchen",      price:35,  original:null,rating:4.2, reviews:290, emoji:"🍶", badge:null  },
    { id:9,  name:"Canvas Backpack",         cat:"Accessories",  price:95,  original:120, rating:4.5, reviews:154, emoji:"🎒", badge:"sale" },
    { id:10, name:"Smart Watch Series 4",    cat:"Electronics",  price:299, original:350, rating:4.6, reviews:621, emoji:"⌚", badge:"sale" },
    { id:11, name:"Dumbbell Set 10kg",       cat:"Sports",       price:149, original:null,rating:4.3, reviews:98,  emoji:"🏋️", badge:"new"  },
    { id:12, name:"Noise Cancelling Headset",cat:"Electronics",  price:199, original:260, rating:4.7, reviews:387, emoji:"🎙️", badge:"sale" },
  ];

  let cart = {};
  let activeCategory = "All";
  let maxPrice = 500;

  /* ── CATEGORIES ───────────────────────────── */
  function buildCategories() {
    const cats = ["All", ...new Set(products.map(p => p.cat))];
    const counts = {};
    products.forEach(p => { counts[p.cat] = (counts[p.cat] || 0) + 1; });
    const el = document.getElementById("category-filters");
    el.innerHTML = cats.map(c => {
      const count = c === "All" ? products.length : (counts[c] || 0);
      return `<button class="filter-btn ${c === activeCategory ? 'active' : ''}"
        onclick="setCategory('${c}')">${c}
        <span class="filter-count">${count}</span>
      </button>`;
    }).join("");
  }

  function setCategory(cat) {
    activeCategory = cat;
    buildCategories();
    renderProducts();
  }

  /* ── PRICE ────────────────────────────────── */
  function updatePrice(val) {
    maxPrice = parseInt(val);
    document.getElementById("price-label").textContent = `₹${val}`;
    renderProducts();
  }

  /* ── STARS ────────────────────────────────── */
  function starHTML(rating) {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;
    return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
  }

  /* ── RENDER PRODUCTS ──────────────────────── */
  function renderProducts() {
    const query   = document.getElementById("search-input").value.toLowerCase();
    const sort    = document.getElementById("sort-select").value;

    let filtered = products.filter(p => {
      const matchCat   = activeCategory === "All" || p.cat === activeCategory;
      const matchPrice = p.price <= maxPrice;
      const matchQ     = p.name.toLowerCase().includes(query) || p.cat.toLowerCase().includes(query);
      return matchCat && matchPrice && matchQ;
    });

    if (sort === "price-asc")  filtered.sort((a,b) => a.price - b.price);
    if (sort === "price-desc") filtered.sort((a,b) => b.price - a.price);
    if (sort === "rating")     filtered.sort((a,b) => b.rating - a.rating);
    if (sort === "name")       filtered.sort((a,b) => a.name.localeCompare(b.name));

    const grid = document.getElementById("product-grid");
    document.getElementById("results-count").innerHTML =
      `Showing <strong>${filtered.length}</strong> product${filtered.length !== 1 ? "s" : ""}`;

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <div class="emoji">🔍</div>
        <p>No products match your filters.<br>Try adjusting the search or category.</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const inCart = cart[p.id] ? cart[p.id].qty : 0;
      return `
      <div class="product-card">
        <div class="product-img">
          <span>${p.emoji}</span>
          ${p.badge === "new"  ? '<span class="badge-new">NEW</span>'  : ""}
          ${p.badge === "sale" ? '<span class="badge-sale">SALE</span>' : ""}
        </div>
        <div class="product-body">
          <span class="product-cat">${p.cat}</span>
          <p class="product-name">${p.name}</p>
          <div class="product-rating">
            <span class="stars">${"★".repeat(Math.floor(p.rating))}${ p.rating%1>=0.5?"½":""}${"☆".repeat(5-Math.floor(p.rating)-(p.rating%1>=0.5?1:0))}</span>
            <span>${p.rating} (${p.reviews})</span>
          </div>
        </div>
        <div class="product-footer">
          <div class="price-block">
            <span class="price-current">₹${p.price}</span>
            ${p.original ? `<span class="price-original">₹${p.original}</span>` : ""}
          </div>
          <button class="btn-add ${inCart ? 'added' : ''}" onclick="addToCart(${p.id})">
            ${inCart ? `✓ In Cart (${inCart})` : "+ Add"}
          </button>
        </div>
      </div>`;
    }).join("");
  }

  /* ── CART ─────────────────────────────────── */
  function addToCart(id) {
    const p = products.find(p => p.id === id);
    if (!cart[id]) cart[id] = { ...p, qty: 0 };
    cart[id].qty++;
    updateCartUI();
    renderProducts();
    showToast(`${p.emoji} ${p.name} added to cart`);
  }

  function changeQty(id, delta) {
    if (!cart[id]) return;
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
    updateCartUI();
    renderProducts();
  }

  function updateCartUI() {
    const items = Object.values(cart);
    const totalQty = items.reduce((s, i) => s + i.qty, 0);
    const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);

    document.getElementById("cart-count").textContent = totalQty;

    const el = document.getElementById("cart-items");
    if (!items.length) {
      el.innerHTML = `<div class="cart-empty">Your cart is empty 🛍️</div>`;
      document.getElementById("cart-footer").style.display = "none";
      return;
    }

    el.innerHTML = items.map(i => `
      <div class="cart-item">
        <span class="cart-item-icon">${i.emoji}</span>
        <div class="cart-item-info">
          <p class="cart-item-name">${i.name}</p>
          <p class="cart-item-price">₹${i.price} each</p>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button>
          <span class="qty-num">${i.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i.id}, +1)">+</button>
        </div>
      </div>`).join("");

    document.getElementById("subtotal").textContent = `₹${subtotal}`;
    document.getElementById("total").textContent    = `₹${subtotal}`;
    document.getElementById("cart-footer").style.display = "block";
  }

  function toggleCart() {
    document.getElementById("cart-panel").classList.toggle("open");
    document.getElementById("cart-overlay").classList.toggle("open");
  }

  function checkout() {
    const total = Object.values(cart).reduce((s,i) => s + i.price * i.qty, 0);
    showToast(`🎉 Order placed! Total: ₹${total}`);
    cart = {};
    updateCartUI();
    toggleCart();
  }

  /* ── TOAST ────────────────────────────────── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
  }

  /* ── INIT ─────────────────────────────────── */
  buildCategories();
  renderProducts();
  updateCartUI();
</script>
</body>
</html>
